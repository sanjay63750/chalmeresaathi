<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register · Chal Mere Saathi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;}
        body{min-height:100vh;background:#0c1d2c;display:flex;flex-direction:column;}
        #background-video{position:fixed;width:100%;height:100%;object-fit:cover;z-index:-2;opacity:0.3;}
        .layer{position:fixed;inset:0;background:#02111fe0;z-index:-1;}
        nav{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 6%;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px);}
        nav h4{font-size:1.8rem;color:white;}
        #menu1{display:flex;gap:2rem;list-style:none;}
        #menu1 a{text-decoration:none;color:white;border-bottom:2px solid transparent;}
        #menu1 a:hover{border-bottom-color:#f5b042;}
        .bi-three-dots{font-size:2rem;color:white;display:none;}
        @media (max-width:800px){#menu1{display:none;}.bi-three-dots{display:block;}}

        .register-wrapper{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:2rem;
        }
        .register-card{
            background:rgba(20, 45, 65, 0.8);
            backdrop-filter:blur(16px);
            width:100%;
            max-width:500px;
            padding:2.5rem 2rem;
            border-radius:60px;
            border:1px solid #eabe6b;
            box-shadow:0 30px 40px -10px black;
        }
        .register-card h2{font-size:2.5rem;color:#ffeac2;margin-bottom:0.5rem;}
        .register-card p{color:#bcd6f0;margin-bottom:2rem;}
        .input-group{margin-bottom:1.5rem;}
        .input-group label{display:block;margin-bottom:0.5rem;color:#fad68f;}
        .input-group input,.input-group select{
            width:100%;
            padding:1rem 1.2rem;
            border-radius:40px;
            border:1px solid #f5b845;
            background:#102f44;
            color:white;
            font-size:1rem;
            outline:none;
        }
        .input-group input::placeholder{color:#9fb0c2;}
        .checkbox{display:flex;gap:0.8rem;align-items:center;margin:1.5rem 0;}
        .checkbox input{width:20px;height:20px;}
        .register-card button{
            width:100%;
            padding:1rem;
            border-radius:40px;
            background:#f5b042;
            border:none;
            font-weight:700;
            font-size:1.5rem;
            color:#011118;
            cursor:pointer;
            transition:0.3s;
        }
        .register-card button:hover{background:#ffa824;}
        .login-link{margin-top:1.5rem;text-align:center;}
        footer{background:#03121f;padding:1.5rem;text-align:center;border-top:1px solid #355161;}
    </style>
</head>
<body>
    <video autoplay muted loop id="background-video"><source src="vid.mp4" type="video/mp4"></video>
    <div class="layer"></div>
    <nav>
        <h4>CHAL MERE SAATHI</h4>
        <ul id="menu1">
            <li><a href="Discover.html">Discover</a></li>
            <li><a href="community.html">Community</a></li>
            <li><a href="special deals.html">Special Deals</a></li>
            <li><a href="about us.html">About Us</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
        <i class="bi bi-three-dots"></i>
    </nav>

    <div class="register-wrapper">
        <div class="register-card">
            <h2>✋ welcome traveller</h2>
            <p>create account & get 500 bonus points</p>
            <div class="input-group"><label>full name</label><input type="text" placeholder="John Doe"></div>
            <div class="input-group"><label>email</label><input type="email" placeholder="hello@example.com"></div>
            <div class="input-group"><label>phone</label><input type="tel" placeholder="+91 98765 43210"></div>
            <div class="input-group"><label>preferred destination</label>
                <select><option>Kerala</option><option>Rajasthan</option><option>Goa</option><option>Himachal</option></select>
            </div>
            <div class="checkbox"><input type="checkbox"> <span>I want travel inspiration & offers</span></div>
            <button>register now</button>
            <div class="login-link">already with us? <a href="#" style="color:#f5b042;">log in</a></div>
        </div>
    </div>

   
</body>
</html>
